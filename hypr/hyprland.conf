# Hyprland config — migrated from awesome/rc.lua
# Palette: gruvbox-dark (theme.lua)
# https://wiki.hyprland.org/Configuring/

# ─── Variables ────────────────────────────────────────────────────────────────
$mod      = SUPER
$alt      = ALT
$term     = ghostty
$browser  = brave-origin
$launcher = $scripts/launcher.sh
$scripts  = $HOME/.config/hypr/scripts

# ─── Monitor ──────────────────────────────────────────────────────────────────
# Adjust as needed; "preferred,auto,1" detects display automatically
monitor = ,preferred,auto,1

# ─── Autostart ────────────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = $scripts/random-wallpaper.sh
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = copyq
exec-once = mako
exec-once = systemctl --user restart hyprvoice
exec-once = xsettingsd
exec-once = waybar
exec-once = $browser --profile-directory='Profile 2' https://sourcefuse.peoplestrong.com/oneweb/#/home

# ─── Environment ──────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ─── Look & Feel ──────────────────────────────────────────────────────────────
general {
    border_size         = 2
    gaps_in             = 3
    gaps_out            = 6
    col.active_border   = rgba(B8BB26ff)   # border_focus
    col.inactive_border = rgba(1A1B26ff)   # border_normal
    layout              = master
    resize_on_border    = true
}

decoration {
    rounding         = 10
    active_opacity     = 0.8
    inactive_opacity   = 0.8
    fullscreen_opacity = 0.8

    shadow {
        enabled     = false
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        noise             = 0.02
        contrast          = 1.0
        brightness        = 0.4
        vibrancy          = 0.2
        new_optimizations = true
    }
}

animations { 
    enabled = no
}

# ─── Layout ───────────────────────────────────────────────────────────────────
master {
    new_status  = slave      # new windows open as slaves (matches awful.client.setslave)
    mfact       = 0.55
    orientation = left
}

# ─── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 0
    sensitivity  = 0

    touchpad {
        natural_scroll       = true   # content follows fingers (mac-style)
        tap-to-click         = true   # 1/2/3-finger tap = L/M/R click
        disable_while_typing = false
        tap-and-drag         = true
        drag_lock            = 0
        clickfinger_behavior = true   # 2-finger click = RMB anywhere on pad
        scroll_factor        = 0.8    # scroll speed multiplier (tune as needed)
    }
}

# ─── Touchpad device override ──────────────────────────────────────────────────
# Must be top-level (not inside input{}) and name must match hyprctl devices exactly
device {
    name           = elan07d9:00-04f3:31ec-touchpad
    sensitivity    = 0.1          # -1.0..1.0; raise if cursor still slow
    accel_profile  = adaptive     # natural accel curve for trackpads
    natural_scroll = true
    scroll_factor  = 0.8
}

# ─── Misc ─────────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    focus_on_activate        = true
}

# ─── Keybindings ──────────────────────────────────────────────────────────────

# Launch (rc.lua: launcher group)
bind = $mod,       Return,  exec, $term
bind = $mod,       e,       exec, nautilus
bind = $mod,       b,       exec, $browser --profile-directory='Profile 2'
bind = $mod SHIFT, b,       exec, $browser --profile-directory='Profile 1'
bind = $mod,       r,       exec, $launcher

# Dictation (hyprvoice — voice-to-text via Groq)
bindr = $mod,       d, exec, ~/.local/bin/hyprvoice toggle   # toggle record on/off (bindr = fires on key release, SUPER released before injection)
bind  = $mod SHIFT, d, exec, ~/.local/bin/hyprvoice cancel   # discard recording

# Screenshot (replaces: maim -sDo | xclip)
bind = $mod, s, exec, $scripts/screenshot.sh

# Screen recording — toggle; slurp region select, stop on second press
bind = $mod SHIFT, s, exec, $scripts/recording.sh

# Clipboard history (replaces: copyq popup)
bind = $mod, p, exec, copyq toggle

# System
bind = $mod,      BackSpace, exec, makoctl dismiss --all   # destroy all notifications
bind = $mod SHIFT, r,        exec, hyprctl reload           # reload config
bind = $mod,      x,        exec, pkill -SIGUSR1 waybar    # toggle wibox → toggle waybar
bind = $mod SHIFT, l,        exec, hyprlock                 # lock screen

# Focus by direction (rc.lua: focus h/j/k/l via global_bydirection)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# Urgent + multi-screen
bind = $mod, u,   focusurgentorlast,
bind = $mod, Tab, focusmonitor, +1   # toggle focus between screens

# Swap (rc.lua: $mod+Shift+j/k)
bind = $mod SHIFT, j, layoutmsg, swapnext
bind = $mod SHIFT, k, layoutmsg, swapprev

# Move to master (rc.lua: $mod+Shift+Return)
bind = $mod SHIFT, Return, layoutmsg, swapwithmaster master

# Master count (rc.lua: $mod+= / $mod+-)
bind = $mod,      equal, layoutmsg, addmaster
bind = $mod,      minus, layoutmsg, removemaster

# Columns / orientation (rc.lua: $mod+Ctrl+= / $mod+Ctrl+-)
bind = $mod CTRL, equal, layoutmsg, orientationnext
bind = $mod CTRL, minus, layoutmsg, orientationprev

# Window actions
bind  = $mod,       f, fullscreen,      0          # toggle fullscreen
bind  = $mod,       m, fullscreen,      1          # (un)maximize
bind  = $mod,       q, killactive,                 # close
bind  = $mod,       o, togglefloating,             # toggle floating
bind  = $mod,       t, pin,                        # always on top (pin = sticky on all workspaces in Hypr)


# Resize (rc.lua: $mod+arrows — tiled adjusts ratio, floating adjusts size)
binde = $mod, Up,    resizeactive,  0 -50
binde = $mod, Down,  resizeactive,  0  50
binde = $mod, Left,  resizeactive, -50  0
binde = $mod, Right, resizeactive,  50  0

# Move floating windows (rc.lua: altkey+arrows)
binde = $alt, Up,    moveactive,  0 -50
binde = $alt, Down,  moveactive,  0  50
binde = $alt, Left,  moveactive, -50  0
binde = $alt, Right, moveactive,  50  0

# Brightness (replaces brightness_widget)
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Audio (pipewire/wpctl — replaces volume_widget)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Mouse binds
bindm = $mod, mouse:272, movewindow    # $mod+LMB drag → move
bindm = $mod, mouse:273, resizewindow  # $mod+RMB drag → resize

# Workspaces 1–9 (rc.lua: for i = 1, 9 → tag:view_only + move_to_tag)
# Icons match tagnames: "  ", " ", "󰨞 ", " ", " ", " ", "󰒱 ", " ", "󱖏 "
bind = $mod,       1, workspace, 1
bind = $mod,       2, workspace, 2
bind = $mod,       3, workspace, 3
bind = $mod,       4, workspace, 4
bind = $mod,       5, workspace, 5
bind = $mod,       6, workspace, 6
bind = $mod,       7, workspace, 7
bind = $mod,       8, workspace, 8
bind = $mod,       9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9

# ─── Window Rules ─────────────────────────────────────────────────────────────

# Float (from rc.lua: awful.rules floating list)
windowrule = match:class (copyq|com.github.hluk.copyq), float on
windowrule = match:class (azote),                       float on
windowrule = match:class (pinentry.*),       float on
windowrule = match:class (Arandr),           float on
windowrule = match:class (blueman-manager),  float on
windowrule = match:class (Gpick),            float on
windowrule = match:class (Kruler),           float on
windowrule = match:class (Sxiv),             float on
windowrule = match:title (Tor Browser),      float on
windowrule = match:class (Wpa_gui),          float on
windowrule = match:class (xtightvncviewer),  float on
windowrule = match:title (Event Tester),     float on
windowrule = match:class (veromix),          float on
windowrule = match:title (MessageWin),       float on

# Center all floating windows
windowrule = match:float 1, center on

# Workspace assignments
windowrule = match:class (obsidian),   workspace 4
windowrule = match:class (Slack|slack), workspace 7

# Suppress maximize requests from apps
windowrule = match:class .*, suppress_event maximize

# Waybar — blur the layer surface (layerrule, not windowrule — waybar is a layer surface)
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.1, match:namespace waybar


