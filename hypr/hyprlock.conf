# hyprlock config — gruvbox-dark palette
# https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

general {
    grace = 0
    hide_cursor = true
}

# ─── Background ───────────────────────────────────────────────────────────────
background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.8
    contrast    = 1.0
    noise       = 0.02
}

# ─── Clock ────────────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%a %b %d, %I:%M %p')"
    color       = rgba(D4BE98ff)   # fg_normal (gruvbox material)
    font_size   = 28
    font_family = NotoSans Nerd Font
    position    = 0, 120
    halign      = center
    valign      = center
}

# ─── Password input ───────────────────────────────────────────────────────────
input-field {
    monitor           =
    size              = 300, 40
    outline_thickness = 1
    dots_size         = 0.25
    dots_spacing      = 0.2
    outer_color       = rgba(EA6962ff)   # red (gruvbox material)
    inner_color       = rgba(1D2021ff)   # bg_normal
    font_color        = rgba(D4BE98ff)   # fg_normal (gruvbox material)
    fade_on_empty     = true
    placeholder_text  = <span foreground="##B8BB26"> Password</span>
    hide_input        = false
    rounding          = 0
    check_color       = rgba(B8BB26ff)   # border_focus
    fail_color        = rgba(EA6962ff)   # red (gruvbox material)
    fail_text         = <span foreground="##D4BE98"> $FAIL ($ATTEMPTS)</span>
    position          = 0, 0
    halign            = center
    valign            = center
}

# ─── Hint label ───────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = Type to unlock
    color       = rgba(A89984ff)   # muted fg (gruvbox material)
    font_size   = 11
    font_family = NotoSans Nerd Font
    position    = 0, -56
    halign      = center
    valign      = center
}
