[General]
; === Gruvbox Material Dark Hard Theme ===
; Adapted from testy-cool/copyq-gruvbox
; Palette: sainnhe/gruvbox-material, dark hard variant

; -- Main list --
bg=#1d2021
fg=#d4be98
alt_bg=#282828
alt_fg=#d4be98
sel_bg=#504945
sel_fg=#d4be98
font="NotoSans Nerd Font,11,-1,5,50,0,0,0,0,0"
show_number=true
show_scrollbars=true
num_fg=#7c6f64
num_font="NotoSans Nerd Font,8,-1,5,25,0,0,0,0,0"

; -- Search bar --
find_bg=#32302f
find_fg=#d8a657
find_font="NotoSans Nerd Font,11,-1,5,50,0,0,0,0,0"
search_bar=\n    background: #32302f;\n    color: #d8a657;\n    border: 1px solid #504945;\n    border-radius: 2px;\n    margin: 4px;\n    padding: 4px;
search_bar_focused=\n    border-color: #d8a657;

; -- Editor --
edit_bg=#282828
edit_fg=#d4be98
edit_font="NotoSans Nerd Font,11,-1,5,50,0,0,0,0,0"

; -- Notes / Tooltips --
notes_bg=#32302f
notes_fg=#c5b18d
notes_font="NotoSans Nerd Font,11,-1,5,50,0,0,0,0,0"
notes_css=

; -- Tab sidebar/tree --
tab_tree_css=\n    background: #1d2021;\n    color: #7c6f64;\n    border: none;
tab_tree_sel_item_css=\n    background: #3c3836;\n    color: #d4be98;
tab_tree_item_counter=\n    color: #7c6f64;\n    font-size: 7pt;
tab_tree_sel_item_counter=\n    color: #c5b18d;

; -- Tab bar --
tab_bar_css=\n    background: #1d2021;
tab_bar_tab_selected_css=\n    background: #3c3836;\n    color: #d4be98;\n    border-bottom: 2px solid #d8a657;
tab_bar_tab_unselected_css=\n    background: #1d2021;\n    color: #7c6f64;
tab_bar_item_counter=\n    color: #7c6f64;
tab_bar_sel_item_counter=\n    color: #c5b18d;
tab_bar_scroll_buttons_css=\n    background: #1d2021;\n    color: #7c6f64;

; -- Toolbar --
tool_bar_css=\n    background: #1d2021;\n    border: none;
tool_button_css=\n    background: #1d2021;\n    color: #7c6f64;\n    border: none;\n    padding: 4px;
tool_button_selected_css=\n    background: #32302f;\n    color: #d4be98;
tool_button_pressed_css=\n    background: #504945;\n    color: #d4be98;

; -- Menus --
menu_css=\n    background: #1d2021;\n    color: #d4be98;\n    border: 1px solid #504945;
menu_bar_css=\n    background: #1d2021;\n    color: #7c6f64;
menu_bar_selected_css=\n    background: #3c3836;\n    color: #d4be98;
menu_bar_disabled_css=\n    color: #504945;

; -- Notifications --
notification_bg=#32302f
notification_fg=#d4be98
notification_font="NotoSans Nerd Font,11,-1,5,50,0,0,0,0,0"

; -- Item styling --
item_css=
alt_item_css=
sel_item_css=
hover_item_css=\n    background: #32302f;
cur_item_css=\n    border: 1px solid #504945;

; -- Enable full window styling --
style_main_window=true
use_system_icons=false

; -- Custom CSS overrides --
css=${css:gruvbox-material-dark-hard}
