<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Alias generic families to preferred Nerd Fonts -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>NotoSans Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer><family>NotoSerif Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>TX02 Nerd Font</family></prefer>
  </alias>

  <!-- Redirect hardcoded monospace stacks (Monaco/Menlo/Consolas/Courier New)
       used by Electron apps like Slack to TX02 Nerd Font -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Monaco</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>TX02 Nerd Font</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Menlo</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>TX02 Nerd Font</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Consolas</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>TX02 Nerd Font</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Courier New</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>TX02 Nerd Font</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>SFMono-Regular</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>TX02 Nerd Font</string>
    </edit>
  </match>

  <!-- Crisp text rendering on standard ~96 DPI RGB LCD -->
  <match target="font">
    <edit mode="assign" name="antialias">     <bool>true</bool></edit>
    <edit mode="assign" name="hinting">        <bool>true</bool></edit>
    <edit mode="assign" name="hintstyle">      <const>hintslight</const></edit>
    <edit mode="assign" name="rgba">           <const>rgb</const></edit>
    <edit mode="assign" name="lcdfilter">      <const>lcddefault</const></edit>
    <edit mode="assign" name="embeddedbitmap"> <bool>false</bool></edit>
  </match>
</fontconfig>
