<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Alias generic families to preferred Nerd Fonts -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>NotoSans Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer><family>NotoSerif Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>TX02 Nerd Font</family></prefer>
  </alias>

  <!-- Crisp text rendering on standard ~96 DPI RGB LCD -->
  <match target="font">
    <edit mode="assign" name="antialias">     <bool>true</bool></edit>
    <edit mode="assign" name="hinting">        <bool>true</bool></edit>
    <edit mode="assign" name="hintstyle">      <const>hintslight</const></edit>
    <edit mode="assign" name="rgba">           <const>rgb</const></edit>
    <edit mode="assign" name="lcdfilter">      <const>lcddefault</const></edit>
    <edit mode="assign" name="embeddedbitmap"> <bool>false</bool></edit>
  </match>
</fontconfig>
