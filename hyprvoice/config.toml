# Hyprvoice Configuration
# Generated by hyprvoice onboarding or configure
# Changes are applied immediately without daemon restart.

# Audio Recording Configuration
[recording]
  sample_rate = 16000
  channels = 1
  format = "s16"
  buffer_size = 8192
  device = ""
  channel_buffer_size = 30
  timeout = "5m0s"

# Speech Transcription Configuration
[transcription]
  provider = "groq-transcription"
  language = "en"
  model = "whisper-large-v3-turbo"
  streaming = false
  threads = 21

[llm]
  enabled = false   # enable later via `hyprvoice configure` for grammar/punctuation cleanup

  [llm.post_processing]
    remove_stutters = true
    add_punctuation = true
    fix_grammar = true
    remove_filler_words = true

  [llm.custom_prompt]
    enabled = false

# Text Injection Configuration
[injection]
  backends = ["wtype"]
  ydotool_timeout = "3s"
  wtype_timeout = "5s"
  clipboard_timeout = "3s"

# Desktop Notification Configuration
[notifications]
  enabled = true
  type = "desktop"
