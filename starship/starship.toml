"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
[](fg:color_red bg:color_yellow)\
$git_branch\
[](fg:color_yellow bg:color_orange)\
$git_state\
$git_status\
[](fg:color_orange bg:color_blue)\
$cmd_duration\
[](fg:color_blue)\
$character"""

add_newline = false
command_timeout = 2000
palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0    = '#EBDBB2'
color_bg1    = '#3C3836'
color_bg3    = '#504945'
color_blue   = '#458588'
color_aqua   = '#3E4934'
color_green  = '#5A633A'
color_orange = '#D65D0E'
color_purple = '#D3869B'
color_red    = '#792329'
color_yellow = '#D79921'

[cmd_duration]
style  = 'fg:color_bg1 bold bg:color_blue'
format = '[ $duration ]($style)'
show_milliseconds = false
min_time = 1000

[directory]
style            = "fg:color_fg0 bg:color_red"
format           = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = '…/'

[git_branch]
symbol = ""
style  = "bg:color_yellow"
format = '[[ $symbol $branch ](fg:color_bg1 bg:color_yellow)]($style)'

[git_state]
style  = "fg:color_bg1 bg:color_orange"
format = '[ $state( $progress_current/$progress_total) ]($style)'

[git_status]
style  = "bg:color_orange"
format = '[[ ($all_status$ahead_behind )](fg:color_bg1 bg:color_orange)]($style)'

[character]
success_symbol = ""
error_symbol   = ""

[package]
disabled = true
